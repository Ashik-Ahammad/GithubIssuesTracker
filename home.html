<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Home - Github Issues Tracker</title>
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown"></div>
          <a class="ms-5  font-bold flex items-center"
            ><img src="assets/github-logo.png" alt="" class="w-8 me-2" />
            <span class="lg:md:text-xl sm:text-sm"> Github Issues Tracker </span></a
          >
        </div>
        <div class="navbar-end">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              id="input-search"
              type="search"
              required
              placeholder="Search"
            />
          </label>
          <button id="btn-search" class="btn btn-primary ms-2">+ New Issue</button>
        </div>
      </div>
    </header>

    <main>
      <!-- ******************************Toggle Btn Sections**************************** -->

      <section
        class="toggle-btn-container w-10/12 shadow-md rounded-md py-10 mt-10 mx-auto bg-gray-50"
      >
        <div class="p-2 ms-5">
          <div class="p-2 ms-5">
            <button id="filter-all-btn" class="btn btn-soft btn-secondary">All</button>
            <button id="filter-open-btn" class="btn btn-soft btn-secondary">Open</button>
            <button id="filter-closed-btn" class="btn btn-soft btn-secondary">Closed</button>
          </div>
        </div>
      </section>

      <!-- ******************************Main Sections**************************** -->

      <section
        class="toggle-btn-container w-10/12 shadow-md rounded-md py-10 mt-8 mx-auto bg-gray-50"
      >
        <div class="p-2 flex justify-between shadow-sm pb-15">
          <div class="flex items-center ms-3">
            <div>
              <img src="assets/Aperture.png" alt="" />
            </div>
            <div class="ms-3">
              <h3 class="text-lg font-semibold">
                <span id="issue-count">0</span> Issues
              </h3>
              <p>Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex justify-center items-center me-3">
            <div class="flex items-center me-2">
              <span class="status bg-[#00A96E] me-2 p-1.5"></span>Open
            </div>
            <div class="items-center flex">
              <span class="status bg-[#A855F7] me-2 p-1.5"></span>Closed
            </div>
          </div>
        </div>

        <!-- **********Spinner********** -->

        <section
          id="spinner"
          class="flex justify-center items-center py-10 hidden"
        >
          <span class="loading loading-bars loading-xl"></span>
        </section>

        <!-- *********************Cards**************** -->
        <section
          id="issue-cards-section"
          class="grid grid-cols-1 gap-6 p-4 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-5"
        >
          <!-- ****Cards load here**** -->
        </section>

        <!-- ************* Modal Here: Open the modal using ID.showModal() method**************** -->
        <section id="modal-container">
          <dialog id="issue_modal" class="modal lg:md:sm:modal-middle">
            <div class="modal-box sm:w-11/12 md:w-10/12 lg:w-5/12 max-w-5xl">
              <div class="modal-action">

              </div>
            </div>
          </dialog>
        </section>
      </section>
    </main>
    <script src="scripts/home.js"></script>
  </body>
</html>
