<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Github Issues Tracker</title>
  </head>
  <body class=" mt-40 pb-15 max-w-md bg-gray-50 shadow-xl rounded-lg mx-auto">
    <div class="logo w-[100px] mx-auto pt-15">
      <img src="assets/github-logo.png" alt="Logo" />
    </div>
    <div class="flex justify-center flex-col items-center my-4">
      <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
      <p class="text-sm text-gray-400">Sign in to manage your issues</p>
    </div>
    <div class="form pt-2">
      <div class="card w-full max-w-sm mx-auto shrink-0 ">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-bold text-black">Username</label>
            <input
              id="input-username"
              type="text"
              required
              class="input rounded-md  w-full"
              placeholder="Enter Username"
            />
            <label class="label font-medium text-blue-700 mb-3">Default: admin</label>
            <label class="label font-bold text-black">Password</label>
            <input
              id="input-password"
              type="password"
              required
              class="input rounded-md w-full"
              placeholder="Enter Password"
            />
            <label class="label font-medium text-blue-700 mb-3">Default: admin123</label>
            <button
              id="signin-btn"
              class="btn btn-primary mt-4 rounded-md w-full"
            >
              Sign In
            </button>
          </fieldset>
        </div>
      </div>
    </div>
    <script src="scripts/signin.js"></script>
  </body>
</html>
